<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bold italic and underline</title>
  </head>
  <body>
    <b>This is Bold</b>
    <i>This is italic</i>
    <br />
    <u>This is underline</u>
    <big>I am Big</big>
    <hr />
    <small>I am Small</small>
    H<sub>2</sub>0
    <br />
    This<sup>is</sup>superscript.
  </body>
</html>
