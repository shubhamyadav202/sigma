<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 12px 15px;
        text-align: left;
      }

      th {
        background-color: #f2f2f2;
        color: #333;
      }

      tr:nth-child(even) {
        background-color: #f9f9f9;
      }

      tr:hover {
        background-color: #e0e0e0;
      }
    </style>
  </head>
  <body>
    <h1>Tables in Html:-</h1>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>Salary</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Snowbam</td>
          <td>fAKE eNGINEER</td>
          <td>$4000000</td>
        </tr>
        <tr>
          <td>sOHAM</td>
          <td>bEGGAR</td>
          <td>$2</td>
        </tr>
        <tr>
          <td>dHONI</td>
          <td>cRICKETTER</td>
          <td>$20000000000</td>
        </tr>
        <tr>
          <td>dewald Brevis</td>
          <td>cRICKETTER</td>
          <td>$50000000</td>
        </tr>
        <tr>
          <td colspan="3">Thank You</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
