<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists</title>
  </head>
  <body>
    <!--Ordered List-->
    <ol>
      <li>Home</li>
      <li>About</li>
    </ol>
    <!--UnOrdered List-->
    <ul>
      <li>Phone</li>
      <li>PC</li>
      <li>Laptop</li>
    </ul>
    <!--Defination List-->
    <dl>
      <dt>Python</dt>
      <dd>
        Guys what do you think Python is a Snake?? Nope You Are Absolutely Wrong
        it's A Programming Language.
      </dd>
    </dl>
  </body>
</html>
